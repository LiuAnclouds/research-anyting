# Moon-Research benchmark registry (P1 seed)
#
# Canonical reference of benchmarks researchers cite. The hallucination-expert
# uses this to confirm dataset names appearing in manuscripts resolve to a
# real artifact; verify_baselines.py consults this when a baseline paper
# claims to evaluate on dataset X.
#
# Schema (per entry):
#   name:           Canonical name. Aliases live under `aliases:`.
#   source:         Hosting authority (snap | pyg | ogb | huggingface | papers-with-code | custom).
#   url:            Authoritative download or landing URL.
#   modality:       graph-dynamic | graph-static | text | image | multimodal | rl-trajectory
#   n_nodes:        Node count if applicable.
#   n_edges:        Edge count if applicable.
#   n_samples:      Sample count for non-graph datasets.
#   anomaly_rate:   Fraction of anomalous edges/nodes/samples (DGAD-relevant).
#   heterophily_h:  Edge heterophily ratio (graph-only; see Pei et al. 2020).
#   license:        Use license.
#   primary_paper:  Bib key of the dataset paper.
#   aliases:        Alternative names seen in the literature.
#   domain:         gnn | vla-vlm | nlp | rl | cross-domain
#
# Three-Times Rule: every numeric field below was checked against the
# primary paper or the source page on the date listed in `verified_at`.
# If you add an entry, populate `verified_at` after verifying.

datasets:

  # =========================================================================
  # Dynamic graph anomaly detection (DGAD) — used in GNN-dynamic manuscript
  # =========================================================================

  - name: Bitcoin-Alpha
    source: snap
    url: https://snap.stanford.edu/data/soc-sign-bitcoin-alpha.html
    modality: graph-dynamic
    n_nodes: 3783
    n_edges: 24186
    heterophily_h: 0.004
    license: SNAP-noncommercial
    primary_paper: kumar2016edge
    aliases: [bitcoin_alpha, soc-sign-bitcoin-alpha]
    domain: gnn
    verified_at: 2026-06-30

